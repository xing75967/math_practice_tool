<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Divisibility Challenge</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}
h1 {
    color: gold;
}
button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}
.choice {
    padding: 10px 30px;
    font-size: 20px;
    margin: 10px;
}
.correct { color: #00ff88; }
.wrong { color: #ff6b6b; }

.box {
    margin-top: 20px;
    font-size: 24px;
}
</style>
</head>

<body>

<h1>🎯 Divisibility Rules Challenge Mode</h1>

<div class="box">⏱ Time: <span id="time">60</span>s</div>
<div class="box">⭐ Score: <span id="score">0</span></div>

<div class="box" id="question"></div>

<button class="choice" id="yesBtn" onclick="answer(true)">YES</button>
<button class="choice" id="noBtn" onclick="answer(false)">NO</button>

<div class="box" id="feedback"></div>
<div class="box" id="summary"></div>

<button onclick="startGame()">Start Game</button>

<script>

let score = 0;
let timeLeft = 60;
let timer;
let currentAnswer = false;

// ✅ 新增：锁定答案（修复BUG核心）
let lockedAnswer = false;

let totalQuestions = 0;
let wrongQuestions = [];

function startGame() {
    score = 0;
    timeLeft = 60;
    totalQuestions = 0;
    wrongQuestions = [];

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = timeLeft;
    document.getElementById("feedback").innerHTML = "";
    document.getElementById("summary").innerHTML = "";

    enableButtons();

    nextQuestion();

    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            endGame();
        }
    }, 1000);
}

function nextQuestion() {
    let n = Math.floor(Math.random() * 900) + 100;
    let divisors = [2,3,4,5,6,9,10,12,15];
    let d = divisors[Math.floor(Math.random() * divisors.length)];

    // ✅ 修复核心：锁定答案
    lockedAnswer = (n % d === 0);
    currentAnswer = lockedAnswer;

    document.getElementById("question").innerHTML =
        `Is <span style="color:gold">${n}</span> divisible by <span style="color:gold">${d}</span>?`;

    currentQuestionText = `${n} ÷ ${d}`;
}

function answer(choice) {
    if (timeLeft <= 0) return;

    totalQuestions++;

    let feedback = document.getElementById("feedback");

    // ✅ 使用锁定答案（关键修复）
    if (choice === lockedAnswer) {
        score++;
        feedback.innerHTML = "<span class='correct'>✔ Correct!</span>";
    } else {
        feedback.innerHTML = "<span class='wrong'>✘ Wrong!</span>";

        wrongQuestions.push({
            q: currentQuestionText,
            correct: lockedAnswer ? "YES" : "NO"
        });
    }

    document.getElementById("score").innerText = score;

    setTimeout(() => {
        feedback.innerHTML = "";
        if (timeLeft > 0) nextQuestion();
    }, 800);
}

function endGame() {
    disableButtons();

    document.getElementById("question").innerHTML = "⏳ Time's up!";

    let accuracy = totalQuestions === 0 ? 0 :
        Math.round((score / totalQuestions) * 100);

    let summaryHTML = `
        <p>⭐ Final Score: <span style="color:gold">${score}</span></p>
        <p>📊 Total Questions: ${totalQuestions}</p>
        <p>✅ Correct: ${score}</p>
        <p>🎯 Accuracy: ${accuracy}%</p>
    `;

    if (wrongQuestions.length > 0) {
        summaryHTML += "<p style='color:#ff6b6b'>❌ Wrong Questions:</p>";
        wrongQuestions.forEach(item => {
            summaryHTML += `<p>${item.q} → Correct: ${item.correct}</p>`;
        });
    }

    document.getElementById("summary").innerHTML = summaryHTML;
}

function disableButtons() {
    document.getElementById("yesBtn").disabled = true;
    document.getElementById("noBtn").disabled = true;
}

function enableButtons() {
    document.getElementById("yesBtn").disabled = false;
    document.getElementById("noBtn").disabled = false;
}

</script>

</body>
</html>
