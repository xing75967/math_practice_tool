h1 {

.magic-text {

/* 学段卡片 */

  margin: 20px auto;

/* 年级按钮 */
.grade-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;

}

.grade-btn {

  border-radius: 10px;

  background: #4a90e2;
  color: white;
  cursor: pointer;

/* 模块卡片 */

}

.module-title {

}

/* 短按钮区域 */
.course-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* 课程短按钮 */
.course-chip {
  padding: 7px 12px;
  border-radius: 20px;
  border: none;
  background: #2ecc71;
  color: white;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
}

.course-chip:hover {

}

.back-btn {
  margin-top: 20px;
  background: #999;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

let level = null;
let grade = null;

// ======================
// Home（学段）
// ======================
function renderHome() {

  level = null;
  grade = null;

  document.getElementById("path").innerText = "📍 Home";

  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.keys(data).forEach(l => {

    const box = document.createElement("div");
    box.className = "level-box";

    const title = document.createElement("h2");
    title.innerText = data[l].name;

    const grid = document.createElement("div");
    grid.className = "grade-grid";

    Object.keys(data[l].grades).forEach(g => {

      const btn = document.createElement("button");
      btn.className = "grade-btn";
      btn.innerText = data[l].grades[g].name;

      btn.onclick = () => renderGrade(l, g);

      grid.appendChild(btn);
    });

    box.appendChild(title);
    box.appendChild(grid);
    app.appendChild(box);
  });
}

// ======================
// Grade → Modules → Courses
// ======================
function renderGrade(l, g) {

  level = l;
  grade = g;

  const gradeData = data[l].grades[g];

  document.getElementById("path").innerText =
    data[l].name + " → " + gradeData.name;

  const app = document.getElementById("app");
  app.innerHTML = "";

  const modules = gradeData.modules;

  Object.keys(modules).forEach(m => {

    const module = modules[m];

    const box = document.createElement("div");
    box.className = "module-box";

    const title = document.createElement("div");
    title.className = "module-title";
    title.innerText = module.title;

    const row = document.createElement("div");
    row.className = "course-row";

    module.courses.forEach(c => {

      const btn = document.createElement("button");
      btn.className = "course-chip";
      btn.innerText = c.name;

      btn.onclick = () => {
        window.location.href = c.file;
      };

      row.appendChild(btn);
    });

    box.appendChild(title);
    box.appendChild(row);
    app.appendChild(box);
  });

  const back = document.createElement("button");
  back.className = "back-btn";
  back.innerText = "⬅ Back";

  back.onclick = () => {
    renderHome();
  };

  app.appendChild(back);
}

// ======================
renderHome();
