<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Math Learning System</title>
</head>
<body>

<h1> Daniel's Class Funny Tools </h1>
<h2> ✝️ I am the math magician who can make your math journey easy！！</h2>
  
<h1>🎓 Math Learning System</h1>
<p id="welcome"></p>

<div id="menu"></div>

<hr>

<p id="last"></p>

<script>

// ========================
// 1. 用户系统（升级版：带权限）
// ========================
const users = {
  "admin": {
    password: "admin",
    allowedGrades: ["all"]
  },
  "user": {
    password: "user123",
    allowedGrades: ["grade3"]
  },
  "userx": {
    password: "userx123",
    allowedGrades: ["grade1", "grade2"]
  },
  "sivan": {
    password: "sivan123",
    allowedGrades: ["grade3", "grade6"]
  }
};


// ========================
// 2. 登录
// ========================
function login(){
  let u = prompt("Username:");
  let p = prompt("Password:");

  if(users[u] && users[u].password === p){

    localStorage.setItem("user", u);
    localStorage.setItem("grades", JSON.stringify(users[u].allowedGrades));

    document.getElementById("welcome").innerText =
      "Welcome, " + u + " 👋";

  } else {
    document.body.innerHTML = "<h1>Wrong login ❌</h1>";
  }
}

login();


// ========================
// 3. 课程模块（按 grade 分类）
// ========================
const modules = {
  general: [
    { name: "Multiplication Challenge", file: "general/Multiplication_Challenge.html" }
  ],

  // grade2: [
  //   { name: "Fraction Scale", file: "g6/fraction2.html" }
  // ],

  grade3: [
    { name: "七星乘法口算", file: "g3/sivan_practice.html" },
    { name: "Multiplication Challenge", file: "general/Multiplication_Challenge.html" }
  ],

  grade6: [
    { name: "Fraction Dynamic", file: "g6/fraction3.html" },
    { name: "Fraction Basic", file: "g6/fraction1.html" }
  ]
};


// ========================
// 4. 根据权限生成菜单（核心升级）
// ========================
const menu = document.getElementById("menu");
const grades = JSON.parse(localStorage.getItem("grades") || "[]");

let list = [];

if(grades.includes("all")){
  list = Object.values(modules).flat();
} else {
  grades.forEach(g => {
    if(modules[g]){
      list = list.concat(modules[g]);
    }
  });
}


// ========================
// 5. 渲染按钮
// ========================
list.forEach(item => {
  const btn = document.createElement("button");
  btn.innerText = item.name;
  btn.style = "font-size:18px;margin:6px;padding:10px;";

  btn.onclick = () => {
    localStorage.setItem("lastPage", item.file);
    window.location.href = item.file;
  };

  menu.appendChild(btn);
  menu.appendChild(document.createElement("br"));
});


// ========================
// 6. 最近访问记录
// ========================
const last = localStorage.getItem("lastPage");
if(last){
  document.getElementById("last").innerText =
    "📌 Recent Practice: " + last;
}

</script>

</body>
</html>
