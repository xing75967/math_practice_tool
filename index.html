<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Math Learning System</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 30px;
    }

    .box {
      border: 1px solid #ddd;
      margin: 15px auto;
      padding: 15px;
      width: 60%;
      border-radius: 10px;
    }

    button {
      margin: 6px;
      padding: 10px;
      width: 80%;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎓 Math Learning System</h1>

<p id="path">📍 Home</p>

<div id="app"></div>

<script>

// ======================
// 1. 三层数据结构
// ======================
const data = {

  primary: {
    name: "📘 Elementary School",
    grades: {
      grade1: {
        name: "Grade 1",
        courses: []
      },
      grade2: {
        name: "Grade 2",
        courses: []
      },
      grade3: {
        name: "Grade 3",
        courses: [
          { name: "七星乘法口算", file: "g3/sivan_practice.html" },
          { name: "Multiplication Challenge", file: "general/Multiplication_Challenge.html" }
        ]
      },

      grade4: {
        name: "Grade 4",
        courses: []
      },
      grade5: {
        name: "Grade 5",
        courses: []
      },
      grade6: {
        name: "Grade 6",
        courses: [
          { name: "Fraction 1", file: "g6/fraction1.html" },
          { name: "Fraction 2", file: "g6/fraction2.html" },
          { name: "Fraction 3", file: "g6/fraction3.html" }
        ]
      }
      
    }
  },

  middle: {
    name: "📗 Middle School",
    grades: {
      
      grade7: {
        name: "Grade 7",
        courses: []
      },
      grade8: {
        name: "Grade 8",
        courses: []
      },
      grade9: {
        name: "Grade 9",
        courses: [
          // { name: "Fraction 1", file: "g6/fraction1.html" },
          // { name: "Fraction 2", file: "g6/fraction2.html" },
          // { name: "Fraction 3", file: "g6/fraction3.html" }
        ]
      }
      
    }
  },

  high: {
    name: "📙 High School",
    grades: {
      grade10: {
        name: "Grade 10",
        courses: []
      },
      grade11: {
        name: "Grade 11",
        courses: []
      },
      grade12: {
        name: "Grade 12",
        courses: []
      }
    }
  }
};

// ======================
// 当前页面状态
// ======================
let level = null;
let grade = null;

// ======================
// 渲染入口
// ======================
function renderHome() {

  level = null;
  grade = null;

  document.getElementById("path").innerText = "📍 Home";

  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.keys(data).forEach(l => {

    const btn = document.createElement("button");
    btn.innerText = data[l].name;

    btn.onclick = () => renderLevel(l);

    app.appendChild(btn);
  });
}

// ======================
// 第二层：学段
// ======================
function renderLevel(l) {

  level = l;

  document.getElementById("path").innerText =
    "📍 " + data[l].name;

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grades = data[l].grades;

  Object.keys(grades).forEach(g => {

    const btn = document.createElement("button");
    btn.innerText = grades[g].name;

    btn.onclick = () => renderGrade(g);

    app.appendChild(btn);
  });

  addBack(renderHome);
}

// ======================
// 第三层：年级 → 课程
// ======================
function renderGrade(g) {

  grade = g;

  const grades = data[level].grades;

  document.getElementById("path").innerText =
    "📍 " + data[level].name + " → " + grades[g].name;

  const app = document.getElementById("app");
  app.innerHTML = "";

  grades[g].courses.forEach(c => {

    const btn = document.createElement("button");
    btn.innerText = c.name;

    btn.onclick = () => {
      window.location.href = c.file;
    };

    app.appendChild(btn);
  });

  addBack(() => renderLevel(level));
}

// ======================
// 返回按钮
// ======================
function addBack(fn) {
  const app = document.getElementById("app");

  const back = document.createElement("button");
  back.innerText = "⬅ Back";

  back.onclick = fn;

  app.appendChild(document.createElement("hr"));
  app.appendChild(back);
}

// ======================
// 初始化
// ======================
renderHome();

</script>

</body>
</html>
