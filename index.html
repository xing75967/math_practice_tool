<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Math Learning System</title>
</head>
<body>

<h1>🎓 Math Learning System</h1>
<p id="welcome"></p>

<script>
const users = {
  "admin": "admin",
  "user": "user123",
  "userx": "userx123",
  "sivan": "sivan123"
};

function login(){
  let u = prompt("Username:");
  let p = prompt("Password:");

  if(users[u] && users[u] === p){
    localStorage.setItem("user", u);
    document.getElementById("welcome").innerText =
      "Welcome, " + u + " 👋";
  } else {
    document.body.innerHTML = "<h1>Wrong login ❌</h1>";
  }
}

login();
</script>

<hr>

<h2>📘 Multiplication</h2>

  七星乘法口算
</button>

<p id="last"></p>

<script>
function go(file){
  let user = localStorage.getItem("user");
  console.log("User:", user, "opening:", file);

  localStorage.setItem("lastPage", file);
  window.location.href = file;
}

// 最近练习记录
const last = localStorage.getItem("lastPage");
if(last){
  document.getElementById("last").innerText =
    "Recent Practice: " + last;
}
</script>

</body>
</html>
