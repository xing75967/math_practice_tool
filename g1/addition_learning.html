<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Addition Visual Learning</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}
h1 { color: gold; }

button {
    padding: 10px 20px;
    margin: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}

input {
    padding: 10px;
    font-size: 18px;
    width: 80px;
}

.correct { color: #00ff88; }
.wrong { color: #ff6b6b; }

.box {
    margin-top: 20px;
    font-size: 22px;
}

.visual {
    margin-top: 20px;
    font-size: 30px;
}

.button-area {
    position: relative;
    margin-top: 10px;
}

.submit-btn {
    display: block;
    margin: 10px auto;
}

.next-btn {
    position: absolute;
    right: 30%;
}
</style>
</head>

<body>

<h1>➕ Addition Learning</h1>

<div class="box" id="question"></div>

<div class="visual" id="visual"></div>

<input id="answerInput" placeholder="Answer">

<div class="button-area">
    <button class="submit-btn" onclick="submitAnswer()">Submit</button>
    <button class="next-btn" onclick="nextQuestion()">Next</button>
</div>

<div class="box" id="feedback"></div>

<script>

let a, b, correctAnswer;

function nextQuestion() {
    a = Math.floor(Math.random() * 5) + 1;
    b = Math.floor(Math.random() * 5) + 1;

    correctAnswer = a + b;

    document.getElementById("question").innerHTML =
        `${a} + ${b} = ?`;

    drawVisual();

    document.getElementById("answerInput").value = "";
    document.getElementById("feedback").innerHTML = "";
}

function drawVisual() {
    let html = "";

    // 原来的两组
    html += "🟡".repeat(a);
    html += " + ";
    html += "🟢".repeat(b);

    html += "<br><br>";

    // ✅ 新整体用不同颜色（蓝色）
    html += "👉 ";
    html += "🔵".repeat(a + b);

    document.getElementById("visual").innerHTML = html;
}

function getExplanation() {
    return `👉 ${a} plus ${b} means:<br>
    ${a} objects put together with ${b} objects,<br>
    we have ${correctAnswer} objects in total.`;
}

function submitAnswer() {
    let user = Number(document.getElementById("answerInput").value);
    let feedback = document.getElementById("feedback");

    let explanation = getExplanation();

    if (user === correctAnswer) {
        feedback.innerHTML =
            `<span class='correct'>✔ Correct! 🎉</span><br><br>${explanation}`;
    } else {
        feedback.innerHTML =
            `<span class='wrong'>✘ Try again 💪</span><br><br>${explanation}`;
    }
}

document.getElementById("answerInput")
.addEventListener("keydown", function(e) {
    if (e.key === "Enter") submitAnswer();
});

nextQuestion();

</script>

</body>
</html>
