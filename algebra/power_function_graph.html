<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Power Function Explorer (Canvas Version)</title>

<style>
body {
    font-family: Arial;
    background: #0b1020;
    color: #e2e8f0;
    text-align: center;
}

h1 {
    color: gold;
}

.container {
    width: 950px;
    margin: auto;
}

canvas {
    background: #0f172a;
    border: 1px solid #334155;
    margin-top: 15px;
}

.controls {
    margin-top: 10px;
}

.summary {
    margin-top: 20px;
    padding: 15px;
    border-top: 1px solid #334155;
}
</style>
</head>

<body>

<h1>📈 Power Function Explorer</h1>

<div class="container">

<canvas id="graph" width="950" height="500"></canvas>

<div class="controls">
<p>n = <span id="nval">1</span></p>
<input type="range" min="-5" max="5" step="0.1" value="1" id="slider">
</div>

</div>

<div class="summary" id="explain"></div>

<script>

const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");
const nval = document.getElementById("nval");

let n = 1;

/* ===== 坐标系统（和你给的一样）===== */
const scale = 30;
const originX = 475;
const originY = 250;

/* ===== GRID ===== */
function drawGrid() {
    ctx.strokeStyle = "#1f2937";
    ctx.lineWidth = 1;

    for (let x = 0; x < canvas.width; x += scale) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    for (let y = 0; y < canvas.height; y += scale) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

/* ===== AXES（加粗）===== */
function drawAxes() {
    ctx.strokeStyle = "#94a3b8";
    ctx.lineWidth = 2;

    // x-axis
    ctx.beginPath();
    ctx.moveTo(0, originY);
    ctx.lineTo(canvas.width, originY);
    ctx.stroke();

    // y-axis
    ctx.beginPath();
    ctx.moveTo(originX, 0);
    ctx.lineTo(originX, canvas.height);
    ctx.stroke();

    ctx.fillStyle = "#94a3b8";
    ctx.font = "12px Arial";

    for (let i = -10; i <= 10; i++) {
        let x = originX + i * scale;
        ctx.fillText(i, x - 5, originY + 15);
    }

    for (let j = -8; j <= 8; j++) {
        let y = originY - j * scale;
        ctx.fillText(j, originX + 5, y + 4);
    }
}

/* ===== 函数 ===== */
function f(x) {
    return Math.pow(x, n);
}

/* ===== 绘图 ===== */
function drawGraph() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawAxes();

    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first = true;

    for (let px = 0; px < canvas.width; px++) {

        let x = (px - originX) / scale;

        // 🔥 n<0断开
        if (n < 0 && Math.abs(x) < 0.05) {
            first = true;
            continue;
        }

        // 分数指数限制
        if (n % 1 !== 0 && x < 0) continue;

        let y = f(x);

        if (!isFinite(y) || Math.abs(y) > 50) {
            first = true;
            continue;
        }

        let py = originY - y * scale;

        if (first) {
            ctx.moveTo(px, py);
            first = false;
        } else {
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();

    drawFormula();
    explain();
}

/* ===== 公式显示 ===== */
function drawFormula() {

    ctx.fillStyle = "rgba(15,23,42,0.9)";
    ctx.fillRect(originX + 150, 10, 300, 50);

    ctx.fillStyle = "#38bdf8";
    ctx.font = "16px Arial";

    ctx.fillText(formatLabel(), originX + 170, 40);
}

/* ===== 格式化 ===== */
function formatLabel() {

    if (n === 1) return "y = x";
    if (n === -1) return "y = 1/x";

    if (Number.isInteger(n)) {
        return `y = x^${n}`;
    } else {
        return `y = x^(${n.toFixed(1)})`;
    }
}

/* ===== 解释 ===== */
function explain() {

    let text = "";

    if (n > 0 && Number.isInteger(n) && n % 2 === 0) {
        text = "Even function → symmetric about y-axis";
    }
    else if (n > 0 && Number.isInteger(n)) {
        text = "Odd function → passes origin";
    }
    else if (n < 0) {
        text = "Negative power → undefined at x = 0";
    }
    else {
        text = "Fraction power → domain x ≥ 0";
    }

    document.getElementById("explain").innerHTML = text;
}

/* ===== 事件 ===== */
slider.oninput = () => {
    n = parseFloat(slider.value);
    nval.innerText = n.toFixed(1);
    drawGraph();
};

drawGraph();

</script>

</body>
</html>
