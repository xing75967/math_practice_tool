<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exponential Symmetry Animation</title>

<style>
body {
    font-family: Arial;
    background: #0b1020;
    color: #e2e8f0;
    text-align: center;
}

h1 {
    color: gold;
}

.container {
    width: 900px;
    margin: auto;
}

canvas {
    background: #0f172a;
    border: 1px solid #334155;
    margin-top: 20px;
}

.slider-box {
    margin: 20px;
}

input {
    width: 300px;
}

.info {
    margin-top: 10px;
    color: #94a3b8;
}

/* ✔ 居中核心结论 */
.summary {
    margin-top: 30px;
    padding: 20px;
    border-top: 1px solid #334155;
    text-align: center;
}

.summary h2 {
    color: #38bdf8;
}
</style>
</head>

<body>

<h1>📈 Exponential Symmetry Animation</h1>

<div class="container">

<div class="slider-box">
    <p>a = <span id="aval">2</span></p>
    <input type="range" min="0.2" max="5" step="0.1" value="2" id="slider">
</div>

<canvas id="graph" width="800" height="450"></canvas>

<p class="info" id="desc"></p>

</div>

<!-- ✔ 居中 + 图标替换 -->
<div class="summary">
<h2>📐 Core Mathematical Insight</h2>

<p>✔ y = a^x and y = (1/a)^x are mirror images across the y-axis</p>
<p>✔ Reflection rule: x → -x</p>
<p>✔ a^x controls growth or decay</p>
<p>✔ Changing a changes steepness</p>
<p>✔ Both curves always pass through (0,1)</p>
</div>

<script>
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");
const aval = document.getElementById("aval");
const desc = document.getElementById("desc");

let a = 2;

/* ✔ scale slightly smaller for cleaner view */
const scale = 40;
const originX = 400;
const originY = 225;

/* ================= GRID ================= */
function drawGrid() {
    ctx.strokeStyle = "#1f2937";
    ctx.lineWidth = 1;

    for (let x = 0; x < canvas.width; x += scale) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    for (let y = 0; y < canvas.height; y += scale) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

/* ================= AXES + LABELS ================= */
function drawAxes() {
    ctx.strokeStyle = "#94a3b8";
    ctx.lineWidth = 2;
    ctx.font = "12px Arial";
    ctx.fillStyle = "#94a3b8";

    // x-axis
    ctx.beginPath();
    ctx.moveTo(0, originY);
    ctx.lineTo(canvas.width, originY);
    ctx.stroke();

    // y-axis
    ctx.beginPath();
    ctx.moveTo(originX, 0);
    ctx.lineTo(originX, canvas.height);
    ctx.stroke();

    // ✔ x labels (-8 ~ 8)
    for (let i = -8; i <= 8; i++) {
        let x = originX + i * scale;
        ctx.fillText(i, x - 5, originY + 15);
    }

    // ✔ y labels (-5 ~ 5)
    for (let j = -5; j <= 5; j++) {
        let y = originY - j * scale;
        ctx.fillText(j, originX + 5, y + 4);
    }
}

/* ================= FUNCTIONS ================= */
function f1(x) {
    return Math.pow(a, x);
}

function f2(x) {
    return Math.pow(1 / a, x);
}

/* ================= CURVE ================= */
function drawCurve(func, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first = true;

    for (let px = 0; px < canvas.width; px++) {
        let x = (px - originX) / scale;
        let y = func(x);

        if (y > 50) continue;

        let py = originY - y * scale;

        if (first) {
            ctx.moveTo(px, py);
            first = false;
        } else {
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();
}

/* ================= LABEL ================= */
function labelText(text, x, y, color) {
    ctx.fillStyle = color;
    ctx.font = "14px Arial";
    ctx.fillText(text, x, y);
}

/* ================= POINT ================= */
function drawPoint(x, y, label, color) {
    let px = originX + x * scale;
    let py = originY - y * scale;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.fillText(label, px + 6, py - 6);
}

/* ================= DRAW ================= */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawAxes();

    drawCurve(f1, "#38bdf8");
    drawCurve(f2, "#22c55e");

    labelText("y = a^x", 620, 120, "#38bdf8");
    labelText("y = (1/a)^x", 620, 150, "#22c55e");

    drawPoint(0, 1, "(0,1)", "#ffffff");
    drawPoint(1, a, "(1,a)", "#38bdf8");
    drawPoint(-1, 1 / a, "(-1,1/a)", "#38bdf8");

    drawPoint(1, 1 / a, "(1,1/a)", "#22c55e");
    drawPoint(-1, a, "(-1,a)", "#22c55e");

    desc.innerText =
        "a = " + a.toFixed(2) +
        " → symmetry across y-axis (x → -x)";
}

/* ================= EVENT ================= */
slider.oninput = function() {
    a = parseFloat(this.value);
    aval.innerText = a;
    draw();
};

draw();
</script>

</body>
</html>
