<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exponential vs Logarithm Explorer</title>

<style>
body {
    font-family: Arial;
    background: #0b1020;
    color: #e2e8f0;
    text-align: center;
}

h1 {
    color: gold;
}

.container {
    width: 900px;
    margin: auto;
}

canvas {
    background: #0f172a;
    border: 1px solid #334155;
    margin-top: 20px;
}

.slider-box {
    margin: 20px;
}

input {
    width: 300px;
}

.info {
    margin-top: 10px;
    color: #94a3b8;
}

.box {
    margin-top: 40px;
    padding: 20px;
    border-top: 1px solid #334155;
}

h2 {
    color: #38bdf8;
}
</style>
</head>

<body>

<h1>🔄 Exponential vs Logarithm</h1>

<div class="container">

<div class="slider-box">
    <p>Base a = <span id="aval">2</span></p>
    <input type="range" min="0.2" max="5" step="0.1" value="2" id="slider">
</div>

<canvas id="graph" width="800" height="450"></canvas>

<p class="info" id="desc"></p>

</div>

<div class="box">
<h2>📚 Key Insight</h2>
<p>✔ y = a^x and y = logₐ(x) are inverse functions</p>
<p>✔ They are reflections across the line y = x</p>
<p>✔ Points swap: (x, y) ↔ (y, x)</p>
</div>

<script>
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("slider");
const aval = document.getElementById("aval");
const desc = document.getElementById("desc");

let a = 2;

const scale = 50;
const originX = 400;
const originY = 225;

/* GRID */
function drawGrid() {
    ctx.strokeStyle = "#1f2937";

    for (let x = 0; x < canvas.width; x += scale) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    for (let y = 0; y < canvas.height; y += scale) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

/* AXES */
function drawAxes() {
    ctx.strokeStyle = "#475569";

    ctx.beginPath();
    ctx.moveTo(0, originY);
    ctx.lineTo(800, originY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(originX, 0);
    ctx.lineTo(originX, 450);
    ctx.stroke();

    ctx.fillStyle = "#94a3b8";
    ctx.font = "12px Arial";

    for (let i = -7; i <= 7; i++) {
        let x = originX + i * scale;
        ctx.fillText(i, x - 5, originY + 20);
    }

    for (let j = -4; j <= 6; j++) {
        let y = originY - j * scale;
        if (j !== 0)
            ctx.fillText(j, originX + 10, y + 5);
    }
}

/* FUNCTIONS */
function expFunc(x) {
    return Math.pow(a, x);
}

function logFunc(x) {
    return Math.log(x) / Math.log(a);
}

/* ✅ FIXED y = x */
function drawSymmetryLine() {
    ctx.strokeStyle = "#f59e0b";
    ctx.setLineDash([5,5]);

    ctx.beginPath();

    let first = true;

    for (let px = 0; px < canvas.width; px++) {
        let x = (px - originX) / scale;
        let y = x;

        let py = originY - y * scale;

        if (first) {
            ctx.moveTo(px, py);
            first = false;
        } else {
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();
    ctx.setLineDash([]);

    // label y=x
    ctx.fillStyle = "#f59e0b";
    ctx.fillText("y = x", originX + 120, originY - 120);
}

/* EXP */
function drawExp() {
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first = true;

    for (let px = 0; px < 800; px++) {
        let x = (px - originX) / scale;
        let y = expFunc(x);

        if (y > 50) continue;

        let py = originY - y * scale;

        if (first) {
            ctx.moveTo(px, py);
            first = false;
        } else {
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();
}

/* LOG */
function drawLog() {
    ctx.strokeStyle = "#22c55e";
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first = true;

    for (let px = 0; px < 800; px++) {
        let x = (px - originX) / scale;
        if (x <= 0) continue;

        let y = logFunc(x);
        let py = originY - y * scale;

        if (first) {
            ctx.moveTo(px, py);
            first = false;
        } else {
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();
}

/* POINT */
function drawPoint(x, y, label) {
    let px = originX + x * scale;
    let py = originY - y * scale;

    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.fillText(label, px + 6, py - 6);
}

/* MAIN */
function drawGraph() {
    ctx.clearRect(0, 0, 800, 450);

    drawGrid();
    drawAxes();
    drawSymmetryLine();

    drawExp();
    drawLog();

    /* 🔵 Exponential key points */
    drawPoint(0, 1, "(0,1)");
    drawPoint(1, a, "(1,a)");
    drawPoint(-1, 1/a, "(-1,1/a)");

    /* 🟢 Logarithmic key points */
    drawPoint(1, 0, "(1,0)");
    drawPoint(a, 1, "(a,1)");
    drawPoint(1/a, -1, "(1/a,-1)");

    desc.innerText =
        "a = " + a.toFixed(2) +
        " → mirror symmetry across y = x";
}

/* SLIDER */
slider.oninput = function() {
    a = parseFloat(this.value);
    aval.innerText = a;
    drawGraph();
};

drawGraph();
</script>

</body>
</html>
