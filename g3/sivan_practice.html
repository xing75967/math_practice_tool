<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>乘法练习</title>

  <script src="/js/guard.js" defer></script>

  <script>
    window.pageGrade = "grade3";
  </script>
</head>

<body>

<h1>乘法口算挑战赛（Sivan专用）</h1>

<div id="app"></div>

<script>

// ===== 你的逻辑完全不改 =====

const user = localStorage.getItem("user");

const NUM_QUESTIONS = 15;
const MAX_FACTOR = 10;
const TIME_PER_QUESTION = 10;

let questions = [];
let current = 0;
let correctCount = 0;
let wrongQuestions = [];
let startTime = 0;
let timer = null;
let timeLeft = TIME_PER_QUESTION;

function generateQuestions(){
  questions = [];
  for(let i=0;i<NUM_QUESTIONS;i++){
    let a = Math.floor(Math.random()*MAX_FACTOR)+1;
    let b = Math.floor(Math.random()*MAX_FACTOR)+1;
    questions.push({a,b,answer:a*b});
  }
}

function start(){
  generateQuestions();
  current = 0;
  correctCount = 0;
  wrongQuestions = [];
  startTime = Date.now();
  showQuestion();
}

function showQuestion(){
  timeLeft = TIME_PER_QUESTION;

  const q = questions[current];

  document.getElementById("app").innerHTML = `
    <h2>${q.a} × ${q.b}</h2>
    <p>⏳ ${timeLeft}s</p>
    <input id="answer" type="number"/>
    <button onclick="submit()">提交</button>
  `;

  startTimer();
}

function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    timeLeft--;
    document.querySelector("p").innerText = `⏳ ${timeLeft}s`;

    if(timeLeft<=0){
      clearInterval(timer);
      handleAnswer(null);
    }
  },1000);
}

function submit(){
  const val = document.getElementById("answer").value;
  handleAnswer(parseInt(val));
}

function handleAnswer(userAnswer){
  clearInterval(timer);

  const q = questions[current];

  if(userAnswer === q.answer){
    correctCount++;
  } else {
    wrongQuestions.push(q);
  }

  current++;

  if(current < NUM_QUESTIONS){
    showQuestion();
  } else {
    end();
  }
}

function end(){
  document.getElementById("app").innerHTML = `
    <h2>完成</h2>
    <p>正确率：${Math.round(correctCount/NUM_QUESTIONS*100)}%</p>
    <button onclick="start()">再来一次</button>
  `;
}

document.getElementById("app").innerHTML =
`<button onclick="start()">开始</button>`;

</script>

</body>
</html>
