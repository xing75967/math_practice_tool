<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>乘法练习（Sivan专用）</title>

  <!-- ✅ 更安全：放 head 但加 defer -->
  <script src="/js/guard.js" defer></script>

  <style>
    body { font-family: Arial; text-align:center; margin-top:50px; }
    input { font-size:20px; padding:5px; }
    button { font-size:18px; margin:5px; padding:8px 15px; }
  </style>
</head>

<body>

<h1>乘法口算挑战赛（升级版）</h1>
<div id="app"></div>

<script>

// ====== 用户信息（可选用于记录） ======
const user = localStorage.getItem("user");

// ===== 可调参数 =====
const NUM_QUESTIONS = 15;
const MAX_FACTOR = 10;
const TIME_PER_QUESTION = 10;

// ===== 状态变量 =====
let questions = [];
let current = 0;
let correctCount = 0;
let wrongQuestions = [];
let startTime = 0;
let timer = null;
let timeLeft = TIME_PER_QUESTION;

// ========================
// 生成题目
// ========================
function generateQuestions() {
  questions = [];
  for (let i = 0; i < NUM_QUESTIONS; i++) {
    let a = Math.floor(Math.random() * MAX_FACTOR) + 1;
    let b = Math.floor(Math.random() * MAX_FACTOR) + 1;
    questions.push({ a, b, answer: a * b });
  }
}

// ========================
// 开始
// ========================
function start() {
  generateQuestions();
  current = 0;
  correctCount = 0;
  wrongQuestions = [];
  startTime = Date.now();
  showQuestion();
}

// ========================
// 显示题目
// ========================
function showQuestion() {
  timeLeft = TIME_PER_QUESTION;

  const q = questions[current];

  document.getElementById("app").innerHTML = `
    <h2>第 ${current + 1} 题：${q.a} × ${q.b}</h2>
    <p>⏳ 剩余时间：<span id="timer">${timeLeft}</span> 秒</p>

    <input id="answer" type="number" autofocus />
    <br/><br/>

    <button onclick="submit()">提交</button>

    <p id="msg"></p>
  `;

  startTimer();
}

// ========================
// 计时器
// ========================
function startTimer() {
  clearInterval(timer);

  timer = setInterval(() => {
    timeLeft--;
    const el = document.getElementById("timer");

    if (el) el.innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      handleAnswer(null);
    }
  }, 1000);
}

// ========================
// 提交答案
// ========================
function submit() {
  const val = document.getElementById("answer").value;
  handleAnswer(parseInt(val));
}

// ========================
// 处理答案
// ========================
function handleAnswer(userAnswer) {
  clearInterval(timer);

  const q = questions[current];
  const correct = userAnswer === q.answer;

  const msg = document.getElementById("msg");

  if (correct) {
    correctCount++;
    if (msg) msg.innerHTML = "✅ 正确";
  } else {
    wrongQuestions.push({
      question: `${q.a} × ${q.b}`,
      correctAnswer: q.answer,
      userAnswer: userAnswer === null ? "超时" : userAnswer
    });

    if (msg) msg.innerHTML = `❌ 错误，正确答案：${q.answer}`;
  }

  current++;

  setTimeout(() => {
    if (current < NUM_QUESTIONS) {
      showQuestion();
    } else {
      end();
    }
  }, 600);
}

// ========================
// 结束 + 结果 +（可扩展保存）
// ========================
function end() {

  const endTime = Date.now();
  const totalTime = ((endTime - startTime) / 1000).toFixed(2);
  const accuracy = Math.round((correctCount / NUM_QUESTIONS) * 100);

  let wrongHtml = "";

  if (wrongQuestions.length > 0) {
    wrongHtml = "<h3>❌ 错题总结：</h3>";
    wrongQuestions.forEach(q => {
      wrongHtml += `<p>${q.question} = ${q.correctAnswer} （你的答案：${q.userAnswer}）</p>`;
    });
  } else {
    wrongHtml = "<h3>🎉 全部正确！</h3>";
  }

  document.getElementById("app").innerHTML = `
    <h2>挑战完成！</h2>

    <p>👤 用户：${user || "unknown"}</p>
    <p>⏱ 总耗时：${totalTime} 秒</p>
    <p>🎯 正确率：${accuracy}%</p>

    ${wrongHtml}

    <br/>
    <button onclick="start()">再来一次</button>
  `;

  // ========================
  // ⭐ 本地保存（后面可升级 Supabase）
  // ========================
  const record = {
    user,
    time: totalTime,
    accuracy,
    correct: correctCount,
    total: NUM_QUESTIONS,
    wrong: wrongQuestions,
    date: new Date().toLocaleString()
  };

  localStorage.setItem("lastResult", JSON.stringify(record));
}

// ========================
// 初始界面
// ========================
document.getElementById("app").innerHTML = `
  <p>用户：${user || "未登录"}</p>
  <p>题目数量：${NUM_QUESTIONS} ｜ 范围：1~${MAX_FACTOR} ｜ 每题${TIME_PER_QUESTION}秒</p>
  <button onclick="start()">开始练习</button>
`;

</script>

</body>
</html>
