<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circle Circumference Practice</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f9ff;
}
.box{
    background:white;
    margin:20px auto;
    padding:20px;
    width:480px;
    border-radius:12px;
}
canvas{
    border:1px solid #ccc;
    margin-top:10px;
}
button{
    padding:8px 12px;
    margin-top:10px;
}
input{
    padding:5px;
    width:100px;
}
</style>
</head>

<body>

<h1>🎯 Circle Circumference Practice</h1>

<div class="box">

<canvas id="c" width="300" height="300"></canvas>

<p id="question"></p>

<input id="answer" placeholder="Enter answer">
<br>
<button onclick="check()">Check</button>

<p id="feedback"></p>

</div>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let r, d, correctAnswer, mode;

// ===== 画图 =====
function drawCircle(){
    ctx.clearRect(0,0,300,300);

    let cx = 150;
    let cy = 150;
    let scale = 10;

    // 圆
    ctx.beginPath();
    ctx.arc(cx, cy, r*scale, 0, Math.PI*2);
    ctx.strokeStyle="red";
    ctx.stroke();

    // 半径
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx + r*scale, cy);
    ctx.strokeStyle="blue";
    ctx.stroke();
    ctx.fillText("r = " + r, cx + r*scale/2, cy - 10);

    // 直径
    ctx.beginPath();
    ctx.moveTo(cx - r*scale, cy);
    ctx.lineTo(cx + r*scale, cy);
    ctx.strokeStyle="green";
    ctx.stroke();
    ctx.fillText("d = " + d, cx - 20, cy + 15);

    // 周长提示
    ctx.fillStyle="red";
    ctx.fillText("Circumference", 90, 30);
}

// ===== 出题 =====
function newQuestion(){
    r = Math.floor(Math.random()*8)+2;
    d = 2*r;

    drawCircle();

    if(Math.random() > 0.5){
        mode = "r";
        correctAnswer = 2 * Math.PI * r;
        document.getElementById("question").innerHTML =
        "Find the circumference. (Given r = " + r + ")";
    }else{
        mode = "d";
        correctAnswer = Math.PI * d;
        document.getElementById("question").innerHTML =
        "Find the circumference. (Given d = " + d + ")";
    }

    document.getElementById("feedback").innerHTML = "";
    document.getElementById("answer").value = "";
}

// ===== 检查 =====
function check(){
    let user = document.getElementById("answer").value;

    if(Math.abs(user - correctAnswer) < 1){
        document.getElementById("feedback").innerHTML = "✅ Correct!";
    }else{
        document.getElementById("feedback").innerHTML =
        "❌ Answer ≈ " + correctAnswer.toFixed(2);
    }

    setTimeout(newQuestion, 1500);
}

// 初始化
newQuestion();
</script>

</body>
</html>
